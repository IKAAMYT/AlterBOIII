name: AlterBO3 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        default: ''

concurrency:
  group: alterbo3-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build AlterBO3 (Release)
    runs-on: windows-2022
    steps:
      - name: Check out files
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: false

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Generate project files
        run: tools/premake5 vs2022

      - name: Set up problem matching
        uses: ammaraskar/msvc-problem-matcher@master

      - name: Build Release
        run: msbuild /m /v:minimal /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=ClangCL build/boiii.sln

      - name: Stage AlterBO3 package
        shell: bash
        run: |
          mkdir -p package
          cp build/bin/x64/Release/boiii.exe package/alterbo3.exe
          cp -r data package/data
          cd package
          7z a -tzip ../AlterBO3.zip ./*

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlterBO3
          path: AlterBO3.zip

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AlterBO3
          path: dist

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: AlterBO3 ${{ steps.tag.outputs.tag }}
          files: dist/AlterBO3.zip
          generate_release_notes: true
          body: |
            **AlterBO3** — reskin IKAAM du client BOIII (Black Ops III).
            Thème MW jaune. Décompresse l'archive dans ton dossier Black Ops III et lance `alterbo3.exe`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
