name: AlterBO3 Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (ex: v1.0.0) — lettres, chiffres, . - _ uniquement, pas d'espace"
        required: false
        default: ''

concurrency:
  group: alterbo3-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # 0. Valide le tag AVANT de compiler (evite 30 min de build pour rien)
  # ---------------------------------------------------------------
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve & validate tag
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "Tag demande : '$TAG'"

          if [ -z "$TAG" ]; then
            echo "::error::Aucun tag fourni. Lance avec un tag (ex: v1.0.0)."
            exit 1
          fi
          if printf '%s' "$TAG" | grep -qE '[[:space:]]'; then
            echo "::error::Le tag '$TAG' contient un espace. GitHub refuse les espaces. Utilise par ex. v2.0.0"
            exit 1
          fi
          if ! printf '%s' "$TAG" | grep -qE '^[A-Za-z0-9._/-]+$'; then
            echo "::error::Le tag '$TAG' contient un caractere interdit. Autorise : A-Z a-z 0-9 . _ - /"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag valide : $TAG"

  # ---------------------------------------------------------------
  # 1. Build (Windows / ClangCL)
  # ---------------------------------------------------------------
  build:
    name: Build AlterBO3 (Release)
    needs: validate
    runs-on: windows-2022
    steps:
      - name: Check out files
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: false

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Generate project files
        run: tools/premake5 vs2022

      - name: Set up problem matching
        uses: ammaraskar/msvc-problem-matcher@master

      - name: Build Release
        run: msbuild /m /v:minimal /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=ClangCL build/boiii.sln

      - name: Stage AlterBO3 package
        shell: bash
        run: |
          mkdir -p package
          cp build/bin/x64/Release/boiii.exe package/alterbo3.exe
          cp -r data package/data
          cd package
          7z a -tzip ../AlterBO3.zip ./*

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AlterBO3
          path: AlterBO3.zip

  # ---------------------------------------------------------------
  # 2. Release GitHub
  # ---------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [validate, build]
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AlterBO3
          path: dist

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: AlterBO3 ${{ needs.validate.outputs.tag }}
          files: dist/AlterBO3.zip
          generate_release_notes: true
          body: |
            **AlterBO3** — reskin IKAAM du client BOIII (Black Ops III).
            Theme MW jaune. Decompresse l'archive dans ton dossier Black Ops III et lance alterbo3.exe.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
