name: BuildNew

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: BuildNew
    runs-on: windows-2022
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - Debug
          - Release
    steps:
      - name: Check out files
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          # NOTE - If LFS ever starts getting used during builds, switch this to true!
          lfs: false

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Fetch WebView2 SDK
        shell: pwsh
        run: |
          $ver = "1.0.2792.45"
          $url = "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$ver"
          Invoke-WebRequest -Uri $url -OutFile webview2.zip
          if (Test-Path deps/webview2) { Remove-Item -Recurse -Force deps/webview2 }
          Expand-Archive -Path webview2.zip -DestinationPath deps/webview2 -Force
          Remove-Item webview2.zip
          if (-not (Test-Path "deps/webview2/build/native/include/WebView2.h")) { Write-Error "WebView2.h manquant"; exit 1 }
          if (-not (Test-Path "deps/webview2/build/native/x64/WebView2LoaderStatic.lib")) { Write-Error "loader manquant"; exit 1 }

      - name: Generate project files
        run: tools/premake5 vs2022

      - name: Get version from git tag
        id: get-version
        run: |
          version=$(git describe --tags --abbrev=0)
          echo "version=$version" >> $GITHUB_OUTPUT
        shell: bash

      - name: Set up problem matching
        uses: ammaraskar/msvc-problem-matcher@master

      - name: Build ${{matrix.configuration}}
        run: msbuild /m /v:minimal /p:Configuration=${{matrix.configuration}} /p:Platform=x64 /p:PlatformToolset=ClangCL build/boiii.sln

      - name: Upload ${{matrix.configuration}} symbols
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4 # Updated from v3.1.3
        with:
          name: ${{matrix.configuration}} Symbols
          path: |
            build/bin/x64/${{matrix.configuration}}/boiii.pdb

      - name: Upload ${{matrix.configuration}} binary
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4 # Updated from v3.1.3
        with:
          name: ${{matrix.configuration}} Binary
          path: |
            build/bin/x64/${{matrix.configuration}}/boiii.exe

      - name: Upload ${{matrix.configuration}} data artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4 # Updated from v3.1.3
        with:
          name: ${{matrix.configuration}} data artifacts
          path: |
            data/*

  create_release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download boiii.exe
        uses: actions/download-artifact@v4 # Updated from v3
        with:
          name: Release Binary
          path: artifacts

      - name: Create a Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.TOKEN }}
          automatic_release_tag: ${{ needs.build.outputs.version }}
          title: Release ${{ needs.build.outputs.version }}
          prerelease: false
          files: |
            artifacts/boiii.exe
